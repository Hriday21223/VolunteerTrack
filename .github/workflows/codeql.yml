# CodeQL workflow for security scanning
# Runs on: push to main, pull requests to main, and scheduled weekly
# Configured to exclude build artifacts and focus on production code

name: "CodeQL"

on:
  push:
    branches: [ main ]
    # Skip CodeQL when only non-production files change
    paths-ignore:
      - 'android/**'
      - 'ios/**'
      - 'dist/**'
      - 'node_modules/**'
      - 'output/**'
      - 'outputs/**'
      - '_site/**'
  pull_request:
    branches: [ main ]
    # Skip CodeQL when only non-production files change
    paths-ignore:
      - 'android/**'
      - 'ios/**'
      - 'dist/**'
      - 'node_modules/**'
      - 'output/**'
      - 'outputs/**'
      - '_site/**'
  # Weekly security scan
  schedule:
    - cron: '17 6 * * 1'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initialize CodeQL with custom configuration
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          # Use config file to exclude build artifacts and non-production code
          config-file: ./.github/codeql-config.yml

      # Setup JavaScript runtime environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Install project dependencies
      - name: Install dependencies
        run: npm ci

      # Build the project for analysis
      - name: Build
        run: npm run build

      # Run CodeQL security analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
