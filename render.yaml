# Render blueprint: one Node web service + a managed Postgres database.
# Deploy by connecting this repo in the Render dashboard (New > Blueprint).
# After the first deploy, set ADMIN_EMAIL / ADMIN_PASSWORD (and optional SMTP
# vars) in the service's Environment tab to seed an admin login.
services:
  - type: web
    name: voluntrack
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /api/recovery-status
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: voluntrack-db
          property: connectionString
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: voluntrack-db
    plan: free
