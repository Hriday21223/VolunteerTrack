# Render blueprint: one Node web service using external Neon database.
# Deploy by connecting this repo in the Render dashboard (New > Blueprint).
# After the first deploy, set DATABASE_URL, ADMIN_EMAIL, ADMIN_PASSWORD (and optional SMTP
# vars) in the service's Environment tab.
services:
  - type: web
    name: voluntrack-backend
    runtime: node
    plan: free
    nodeVersion: 18
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/recovery-status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
